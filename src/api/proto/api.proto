syntax = "proto3";

package protocol;

// ============================================================================
// CORE TYPES
// ============================================================================

// Represents a geographic position with latitude and longitude
message Position {
  double lat = 1;
  double lon = 2;
}

// Represents a cost weight for a specific factor (e.g., Pricesensitivity, PathDeviation etc.)
message CostWeight {
  int32 id = 1;
  float updated_value = 2;
}

// ============================================================================
// INITIALIZATION TYPES
// ============================================================================

// Represents a charger at a station, including its max power and whether it's dual or single
message Charger {
  int32 id = 1;
  int32 max_power_kw = 2;
  bool is_dual = 3;
  int32 station_id = 4;
}

// Represents the initial data for a station sent from the engine to the client upon connection
message StationInit {
  uint32 id = 1;
  Position pos = 2;
  string address = 3;
}

// Initial data sent from the engine to the client upon connection, containing all stations and chargers
message InitEngineData {
  repeated Charger chargers = 1;
  repeated StationInit stations = 2;
}

// ============================================================================
// Snapshots
// ============================================================================

// Represents the state of a single EV in a charger queue.
message EVChargerState {
  int32 ev_id = 1;
  float soc = 2;
  float target_soc = 3;
  uint32 finish_time_ms = 4;
}

// Represents the state of a single charger.
message ChargerState {
  bool is_active = 1;
  float utilization = 2;
  uint32 charger_id = 3;
  uint32 queue_size = 4;
  repeated EVChargerState evs_charging = 5;
  repeated EVChargerState evs_in_queue = 6;
}

// Represents an EV currently on route to a station, including its waypoints
message EVOnRoute {
  int32 ev_id = 1;
  repeated Position waypoints = 2;
}

// Snapshot of a station's state, including all chargers and EVs currently on route to it
message StationState {
  uint32 station_id = 1;
  repeated ChargerState charger_states = 2;
  repeated EVOnRoute evs_on_route = 3;
}

// ============================================================================
// EVENT TYPES (Server -> Client pushes)
// ============================================================================

// Periodic snapshot of the overall simulation state (e.g., every second)
message SimulationSnapshot {
  uint32 total_evs = 1;
  uint32 total_charging = 2;
  uint32 simulation_time_ms = 3;
}

/*
   Message Envelope

   A wrapper message that can contain any of the defined message types.
   This allows us to have a single WebSocket endpoint that can handle all types of
   messages,
*/
message Envelope {
  oneof payload {
    // Server Responses (20-29)
    InitEngineData init_engine_data = 10;
    StationState station_state_response = 11; // response to GetStationSnapshot

    // Server Events/Pushes (30-39)
    SimulationSnapshot state_update = 20;
  }
}
